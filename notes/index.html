<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>NoteFlow</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Hebrew:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f4f5f7;
  --surface: #ffffff;
  --surface2: #edf0f4;
  --border: #e2e5ea;
  --text: #1a1d23;
  --text2: #5f6672;
  --text3: #9ca3af;
  --accent: #2563eb;
  --accent-bg: #eef4ff;
  --accent-dark: #1e40af;
  --pin: #f59e0b;
  --pin-bg: #fffbeb;
  --danger: #ef4444;
  --green: #10b981;
  --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 1px 3px rgba(0,0,0,0.06);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
  --font: 'IBM Plex Sans Hebrew', system-ui, sans-serif;
  --mono: 'IBM Plex Mono', monospace;
  --topbar: 56px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body { font-family: var(--font); background: var(--bg); color: var(--text); display: flex; flex-direction: column; }

/* ═══ TOPBAR ═══ */
.topbar {
  height: var(--topbar);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 12px;
  flex-shrink: 0;
  z-index: 100;
}

.topbar .logo {
  font-size: 17px;
  font-weight: 700;
  letter-spacing: -0.5px;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 8px;
}

.topbar .logo .dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--green);
  flex-shrink: 0;
}

.topbar .count {
  font-size: 12px;
  color: var(--text3);
  font-weight: 500;
}

.topbar .spacer { flex: 1; }

.tb-btn {
  width: 36px;
  height: 36px;
  border: none;
  background: none;
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  cursor: pointer;
  color: var(--text2);
  transition: background 0.15s;
}
.tb-btn:hover { background: var(--surface2); }
.tb-btn.active { background: var(--accent-bg); color: var(--accent); }

/* ═══ SEARCH BAR ═══ */
.search-bar {
  display: none;
  padding: 8px 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.search-bar.open { display: flex; gap: 8px; align-items: center; }

.search-bar input {
  flex: 1;
  padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: var(--font);
  font-size: 14px;
  background: var(--surface2);
  color: var(--text);
  outline: none;
}
.search-bar input:focus { border-color: var(--accent); background: var(--surface); }
.search-bar .close-search {
  border: none;
  background: none;
  font-size: 14px;
  color: var(--accent);
  font-family: var(--font);
  font-weight: 600;
  cursor: pointer;
  padding: 4px 8px;
}

/* ═══ CLIENT FILTER CHIPS ═══ */
.filter-bar {
  display: none;
  padding: 8px 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  overflow-x: auto;
  gap: 6px;
  -webkit-overflow-scrolling: touch;
}
.filter-bar.show { display: flex; }
.filter-bar::-webkit-scrollbar { display: none; }

.filter-chip {
  padding: 5px 12px;
  border: 1px solid var(--border);
  border-radius: 50px;
  background: var(--surface);
  font-family: var(--font);
  font-size: 12px;
  font-weight: 500;
  color: var(--text2);
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  transition: all 0.15s;
}
.filter-chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.filter-chip:hover:not(.active) { background: var(--surface2); }

/* ═══ NOTES LIST ═══ */
.notes-wrap {
  flex: 1;
  overflow-y: auto;
  padding: 12px 16px 100px;
  -webkit-overflow-scrolling: touch;
}

.section-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  padding: 12px 4px 6px;
}

/* ═══ NOTE CARD ═══ */
.note {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 14px;
  margin-bottom: 8px;
  position: relative;
  transition: box-shadow 0.15s, border-color 0.15s;
  cursor: default;
}
.note:hover { box-shadow: var(--shadow-md); border-color: #d0d4da; }
.note.pinned { border-right: 3px solid var(--pin); background: var(--pin-bg); }

.note .n-top {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 6px;
}

.note .n-client {
  font-size: 11px;
  font-weight: 600;
  color: var(--accent);
  background: var(--accent-bg);
  padding: 2px 8px;
  border-radius: 50px;
}

.note .n-pin {
  font-size: 12px;
  color: var(--pin);
}

.note .n-time {
  font-size: 11px;
  color: var(--text3);
  margin-right: auto;
  font-family: var(--mono);
}

.note .n-text {
  font-size: 14px;
  line-height: 1.6;
  color: var(--text);
  white-space: pre-wrap;
  word-break: break-word;
}

.note .n-actions {
  display: none;
  position: absolute;
  top: 8px;
  left: 8px;
  gap: 2px;
}
.note:hover .n-actions { display: flex; }

.n-act {
  width: 28px;
  height: 28px;
  border: none;
  background: var(--surface2);
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  cursor: pointer;
  transition: background 0.15s;
}
.n-act:hover { background: #dde1e8; }
.n-act.del:hover { background: #fee2e2; }

/* Mobile: show actions always via long press or swipe — for now show on tap */
@media (hover: none) {
  .note .n-actions { display: flex; opacity: 0.5; }
  .note .n-actions:active { opacity: 1; }
}

/* ═══ INPUT BAR ═══ */
.input-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding: 10px 16px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  z-index: 100;
  box-shadow: 0 -2px 12px rgba(0,0,0,0.04);
}

.input-row {
  display: flex;
  gap: 8px;
  align-items: flex-end;
}

.input-bar textarea {
  flex: 1;
  padding: 10px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-family: var(--font);
  font-size: 14px;
  color: var(--text);
  background: var(--surface2);
  resize: none;
  outline: none;
  min-height: 40px;
  max-height: 120px;
  line-height: 1.5;
}
.input-bar textarea:focus { border-color: var(--accent); background: var(--surface); }
.input-bar textarea::placeholder { color: var(--text3); }

.send-btn {
  width: 40px;
  height: 40px;
  border: none;
  background: var(--accent);
  color: #fff;
  border-radius: var(--radius);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  cursor: pointer;
  flex-shrink: 0;
  transition: background 0.15s;
}
.send-btn:hover { background: var(--accent-dark); }
.send-btn:active { transform: scale(0.95); }

/* Client tag input row */
.tag-row {
  display: flex;
  gap: 6px;
  align-items: center;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
.tag-row::-webkit-scrollbar { display: none; }

.tag-row .tag-label {
  font-size: 11px;
  color: var(--text3);
  font-weight: 600;
  white-space: nowrap;
  flex-shrink: 0;
}

.tag-pick {
  padding: 4px 10px;
  border: 1px solid var(--border);
  border-radius: 50px;
  background: var(--surface);
  font-family: var(--font);
  font-size: 11px;
  font-weight: 500;
  color: var(--text2);
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  transition: all 0.15s;
}
.tag-pick.active { background: var(--accent); color: #fff; border-color: var(--accent); }

.tag-custom {
  padding: 4px 10px;
  border: 1px dashed var(--border);
  border-radius: 50px;
  background: none;
  font-family: var(--font);
  font-size: 11px;
  color: var(--text3);
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
}

/* ═══ EDIT MODAL ═══ */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 200;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal-overlay.open { display: flex; }

.modal {
  background: var(--surface);
  border-radius: 16px;
  padding: 24px;
  width: 100%;
  max-width: 420px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  animation: modalIn 0.2s ease;
}
@keyframes modalIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

.modal h3 {
  font-size: 17px;
  font-weight: 700;
  margin-bottom: 16px;
}

.modal textarea {
  width: 100%;
  padding: 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: var(--font);
  font-size: 14px;
  color: var(--text);
  resize: vertical;
  min-height: 80px;
  outline: none;
}
.modal textarea:focus { border-color: var(--accent); }

.modal-btns {
  display: flex;
  gap: 8px;
  margin-top: 16px;
  justify-content: flex-end;
}
.modal-btns button {
  padding: 8px 20px;
  border-radius: var(--radius-sm);
  font-family: var(--font);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  border: none;
}
.modal-btns .save { background: var(--accent); color: #fff; }
.modal-btns .cancel { background: var(--surface2); color: var(--text2); }

/* ═══ TOAST ═══ */
.toast {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--text);
  color: #fff;
  padding: 10px 20px;
  border-radius: 50px;
  font-size: 13px;
  font-weight: 600;
  z-index: 300;
  opacity: 0;
  transition: all 0.3s ease;
  pointer-events: none;
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ═══ EMPTY STATE ═══ */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text3);
}
.empty-state .emoji { font-size: 40px; margin-bottom: 12px; display: block; }
.empty-state .title { font-size: 16px; font-weight: 600; color: var(--text2); margin-bottom: 4px; }
.empty-state .sub { font-size: 13px; }

/* ═══ STATUS DOT ═══ */
.save-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--green);
  flex-shrink: 0;
  transition: background 0.3s;
}
.save-dot.saving { background: var(--pin); animation: pulse 1s infinite; }
.save-dot.error { background: var(--danger); }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
</style>
</head>
<body>

<!-- ═══ TOPBAR ═══ -->
<div class="topbar">
  <div class="logo">
    <div class="dot"></div>
    NoteFlow
  </div>
  <span class="count" id="noteCount">0 notes</span>
  <div class="save-dot" id="saveDot"></div>
  <div class="spacer"></div>
  <button class="tb-btn" id="filterToggle" onclick="toggleFilterBar()" title="Filter">🏷️</button>
  <button class="tb-btn" id="searchToggle" onclick="toggleSearch()" title="Search">🔍</button>
</div>

<!-- ═══ SEARCH ═══ -->
<div class="search-bar" id="searchBar">
  <input type="text" id="searchInput" placeholder="חפש בהערות..." oninput="applyFilters()">
  <button class="close-search" onclick="toggleSearch()">ביטול</button>
</div>

<!-- ═══ CLIENT FILTER ═══ -->
<div class="filter-bar" id="filterBar">
  <button class="filter-chip active" onclick="filterByClient('all', this)">הכל</button>
</div>

<!-- ═══ NOTES LIST ═══ -->
<div class="notes-wrap" id="notesWrap">
  <div class="empty-state" id="emptyState">
    <span class="emoji">📝</span>
    <div class="title">אין הערות עדיין</div>
    <div class="sub">כתוב משהו למטה כדי להתחיל</div>
  </div>
  <div id="pinnedSection" style="display:none">
    <div class="section-label">📌 נעוצים</div>
    <div id="pinnedList"></div>
  </div>
  <div id="notesSection">
    <div id="notesList"></div>
  </div>
</div>

<!-- ═══ INPUT BAR ═══ -->
<div class="input-bar">
  <div class="tag-row" id="tagRow">
    <span class="tag-label">לקוח:</span>
    <!-- populated dynamically -->
  </div>
  <div class="input-row">
    <textarea id="noteInput" placeholder="הערה חדשה..." rows="1" oninput="autoResize(this)"></textarea>
    <button class="send-btn" onclick="addNote()">↑</button>
  </div>
</div>

<!-- ═══ EDIT MODAL ═══ -->
<div class="modal-overlay" id="editOverlay" onclick="if(event.target===this)closeEdit()">
  <div class="modal">
    <h3>✏️ עריכה</h3>
    <textarea id="editText" rows="4"></textarea>
    <div class="modal-btns">
      <button class="cancel" onclick="closeEdit()">ביטול</button>
      <button class="save" onclick="saveEdit()">שמור</button>
    </div>
  </div>
</div>

<!-- ═══ TOAST ═══ -->
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════
// NOTEFLOW — MSP Work Notes Tool
// Storage: Netlify Functions + JSONbin
// ═══════════════════════════════════════════════════════

let notes = [];
let currentFilter = 'all';
let searchQuery = '';
let selectedClient = '';
let editingId = null;
let saveTimer = null;
const dot = document.getElementById('saveDot');

// ── Client list (auto-populated from notes + defaults) ──
const defaultClients = ['כללי'];

function getClients() {
  const set = new Set(defaultClients);
  notes.forEach(n => { if (n.client) set.add(n.client); });
  return [...set];
}

function detectDirection(text) {
  const heb = /[\u0590-\u05FF]/;
  return heb.test(text.charAt(0)) ? 'rtl' : 'ltr';
}

// ── Auto-resize textarea ──
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// ── Render ──
function render() {
  const filtered = getFilteredNotes();
  const pinned = filtered.filter(n => n.pinned);
  const unpinned = filtered.filter(n => !n.pinned);

  // Update count
  document.getElementById('noteCount').textContent = `${notes.length} notes`;

  // Pinned section
  const pinnedSec = document.getElementById('pinnedSection');
  const pinnedList = document.getElementById('pinnedList');
  if (pinned.length) {
    pinnedSec.style.display = 'block';
    pinnedList.innerHTML = pinned.map(n => renderNote(n)).join('');
  } else {
    pinnedSec.style.display = 'none';
  }

  // Notes
  const notesList = document.getElementById('notesList');
  const empty = document.getElementById('emptyState');

  if (unpinned.length) {
    empty.style.display = 'none';
    // Group by date
    const groups = {};
    unpinned.forEach(n => {
      const d = new Date(n.ts);
      const key = d.toLocaleDateString('he-IL', { weekday: 'long', day: 'numeric', month: 'long' });
      if (!groups[key]) groups[key] = [];
      groups[key].push(n);
    });
    let html = '';
    for (const [day, items] of Object.entries(groups)) {
      html += `<div class="section-label">${day}</div>`;
      html += items.map(n => renderNote(n)).join('');
    }
    notesList.innerHTML = html;
  } else if (!pinned.length) {
    empty.style.display = 'block';
    notesList.innerHTML = '';
  } else {
    empty.style.display = 'none';
    notesList.innerHTML = '';
  }

  // Update filter chips
  renderFilterChips();
  renderTagPicker();
}

function renderNote(n) {
  const d = new Date(n.ts);
  const time = `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  const dir = detectDirection(n.text);
  const pinIcon = n.pinned ? '📌' : '';
  const clientTag = n.client && n.client !== 'כללי' ? `<span class="n-client">${n.client}</span>` : '';

  return `<div class="note${n.pinned ? ' pinned' : ''}" data-id="${n.id}">
    <div class="n-actions">
      <button class="n-act" onclick="togglePin('${n.id}')" title="${n.pinned ? 'בטל נעיצה' : 'נעץ'}">${n.pinned ? '📌' : '📍'}</button>
      <button class="n-act" onclick="openEdit('${n.id}')" title="ערוך">✏️</button>
      <button class="n-act del" onclick="deleteNote('${n.id}')" title="מחק">🗑️</button>
    </div>
    <div class="n-top">
      ${clientTag}
      ${pinIcon ? `<span class="n-pin">${pinIcon}</span>` : ''}
      <span class="n-time">${time}</span>
    </div>
    <div class="n-text" dir="${dir}">${escapeHtml(n.text)}</div>
  </div>`;
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function getFilteredNotes() {
  let result = [...notes];
  // Client filter
  if (currentFilter !== 'all') {
    result = result.filter(n => n.client === currentFilter);
  }
  // Search
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    result = result.filter(n => n.text.toLowerCase().includes(q) || (n.client || '').toLowerCase().includes(q));
  }
  return result;
}

// ── Filter chips ──
function renderFilterChips() {
  const bar = document.getElementById('filterBar');
  const clients = getClients();
  const chips = [`<button class="filter-chip${currentFilter === 'all' ? ' active' : ''}" onclick="filterByClient('all', this)">הכל (${notes.length})</button>`];
  clients.forEach(c => {
    const count = notes.filter(n => n.client === c).length;
    if (count > 0) {
      chips.push(`<button class="filter-chip${currentFilter === c ? ' active' : ''}" onclick="filterByClient('${c}', this)">${c} (${count})</button>`);
    }
  });
  bar.innerHTML = chips.join('');
}

function filterByClient(client) {
  currentFilter = client;
  render();
}

function toggleFilterBar() {
  const bar = document.getElementById('filterBar');
  bar.classList.toggle('show');
  document.getElementById('filterToggle').classList.toggle('active');
}

// ── Tag picker in input ──
function renderTagPicker() {
  const row = document.getElementById('tagRow');
  const clients = getClients();
  let html = '<span class="tag-label">לקוח:</span>';
  clients.forEach(c => {
    html += `<button class="tag-pick${selectedClient === c ? ' active' : ''}" onclick="pickClient('${c}')">${c}</button>`;
  });
  html += `<button class="tag-custom" onclick="promptNewClient()">+ חדש</button>`;
  row.innerHTML = html;
}

function pickClient(c) {
  selectedClient = selectedClient === c ? '' : c;
  renderTagPicker();
}

function promptNewClient() {
  const name = prompt('שם לקוח חדש:');
  if (name && name.trim()) {
    selectedClient = name.trim();
    render();
  }
}

// ── Search ──
function toggleSearch() {
  const bar = document.getElementById('searchBar');
  bar.classList.toggle('open');
  document.getElementById('searchToggle').classList.toggle('active');
  if (bar.classList.contains('open')) {
    document.getElementById('searchInput').focus();
  } else {
    document.getElementById('searchInput').value = '';
    searchQuery = '';
    render();
  }
}

function applyFilters() {
  searchQuery = document.getElementById('searchInput').value;
  render();
}

// ── Add note ──
function addNote() {
  const input = document.getElementById('noteInput');
  const text = input.value.trim();
  if (!text) return;

  const note = {
    id: Date.now().toString(36) + Math.random().toString(36).substr(2, 5),
    text,
    client: selectedClient || 'כללי',
    ts: Date.now(),
    pinned: false
  };

  notes.unshift(note);
  input.value = '';
  input.style.height = 'auto';
  render();
  triggerSave();
  document.getElementById('notesWrap').scrollTop = 0;
}

// Ctrl+Enter / Enter to send
document.getElementById('noteInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    addNote();
  }
});

// ── Pin ──
function togglePin(id) {
  const n = notes.find(x => x.id === id);
  if (n) { n.pinned = !n.pinned; render(); triggerSave(); }
}

// ── Delete ──
function deleteNote(id) {
  const i = notes.findIndex(x => x.id === id);
  if (i > -1) {
    const removed = notes.splice(i, 1)[0];
    render();
    triggerSave();
    showToast('🗑️ נמחק', () => {
      notes.splice(i, 0, removed);
      render();
      triggerSave();
    });
  }
}

// ── Edit ──
function openEdit(id) {
  const n = notes.find(x => x.id === id);
  if (!n) return;
  editingId = id;
  document.getElementById('editText').value = n.text;
  document.getElementById('editOverlay').classList.add('open');
}

function closeEdit() {
  editingId = null;
  document.getElementById('editOverlay').classList.remove('open');
}

function saveEdit() {
  if (!editingId) return;
  const n = notes.find(x => x.id === editingId);
  if (n) {
    n.text = document.getElementById('editText').value.trim();
    render();
    triggerSave();
  }
  closeEdit();
}

// ── Toast with undo ──
let toastTimer;
function showToast(msg, undoFn) {
  const toast = document.getElementById('toast');
  clearTimeout(toastTimer);
  if (undoFn) {
    toast.innerHTML = `${msg} <button onclick="this.parentElement._undo()" style="background:rgba(255,255,255,0.2);border:none;color:#fff;padding:3px 10px;border-radius:20px;font-family:var(--font);font-weight:600;font-size:12px;cursor:pointer;margin-right:8px">ביטול</button>`;
    toast._undo = () => { undoFn(); toast.classList.remove('show'); clearTimeout(toastTimer); };
  } else {
    toast.textContent = msg;
  }
  toast.classList.add('show');
  toastTimer = setTimeout(() => toast.classList.remove('show'), 4000);
}

// ═══════════════════════════════════════════════════════
// SAVE / LOAD via Netlify Functions + JSONbin
// ═══════════════════════════════════════════════════════

function triggerSave() {
  clearTimeout(saveTimer);
  dot.className = 'save-dot saving';
  saveTimer = setTimeout(doSave, 1200);
}

async function doSave() {
  try {
    const res = await fetch('/.netlify/functions/notes', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ notes })
    });
    if (res.ok) dot.className = 'save-dot';
    else dot.className = 'save-dot error';
  } catch (e) {
    dot.className = 'save-dot error';
  }
}

async function loadNotes() {
  try {
    const res = await fetch('/.netlify/functions/notes');
    const data = await res.json();
    notes = data.notes || [];
    render();
    dot.className = 'save-dot';
  } catch (e) {
    dot.className = 'save-dot error';
    notes = [];
    render();
  }
}

// ── Init ──
loadNotes();
</script>
