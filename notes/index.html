<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>NoteFlow</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Hebrew:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
<style>
:root{--bg:#f4f5f7;--surface:#fff;--surface2:#edf0f4;--border:#e2e5ea;--text:#1a1d23;--text2:#5f6672;--text3:#9ca3af;--accent:#2563eb;--accent-bg:#eef4ff;--accent-dark:#1e40af;--pin-c:#f59e0b;--pin-bg:#fffbeb;--danger:#ef4444;--green:#10b981;--radius:12px;--radius-sm:8px;--shadow:0 1px 3px rgba(0,0,0,.06);--shadow-md:0 4px 12px rgba(0,0,0,.08);--font:'IBM Plex Sans Hebrew',system-ui,sans-serif;--mono:'IBM Plex Mono',monospace}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--bg);color:var(--text);display:flex;flex-direction:column}

.pin-screen{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.pin-screen.hidden{display:none}
.pin-logo{font-size:36px}.pin-title{font-size:20px;font-weight:700}.pin-sub{font-size:13px;color:var(--text3);text-align:center;max-width:280px}
.pin-dots{display:flex;gap:12px;margin:8px 0}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--border);transition:.15s}
.pin-dot.filled{background:var(--accent);border-color:var(--accent)}
.pin-dot.error{background:var(--danger);border-color:var(--danger);animation:shake .4s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.pin-pad{display:grid;grid-template-columns:repeat(3,72px);gap:10px;margin-top:8px}
.pin-key{width:72px;height:56px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);font-family:var(--font);font-size:22px;font-weight:600;color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;user-select:none}
.pin-key:active{background:var(--surface2)}
.pin-key.fn{font-size:13px;color:var(--text2);border:none;background:none}
.pin-setup-fields{display:flex;flex-direction:column;gap:12px;width:260px}
.pin-setup-fields input{padding:12px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:var(--font);font-size:16px;text-align:center;letter-spacing:8px;outline:none;background:var(--surface);color:var(--text)}
.pin-setup-fields input:focus{border-color:var(--accent)}
.pin-setup-btn{padding:14px;border:none;border-radius:var(--radius-sm);background:var(--accent);color:#fff;font-family:var(--font);font-size:15px;font-weight:700;cursor:pointer}
.pin-error{font-size:13px;color:var(--danger);font-weight:600;min-height:20px}

.app{display:none;flex-direction:column;height:100%}.app.active{display:flex}

.topbar{height:52px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 12px;gap:8px;flex-shrink:0;z-index:100}
.topbar .logo{font-size:16px;font-weight:700;letter-spacing:-.5px;display:flex;align-items:center;gap:6px}
.topbar .logo .dot{width:7px;height:7px;border-radius:50%;background:var(--green)}
.save-dot{width:5px;height:5px;border-radius:50%;background:var(--green);transition:.3s}
.save-dot.saving{background:var(--pin-c);animation:pulse 1s infinite}.save-dot.error{background:var(--danger)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.spacer{flex:1}
.tb-btn{width:34px;height:34px;border:none;background:none;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;color:var(--text2)}
.tb-btn:active{background:var(--surface2)}

.view{display:none;flex:1;flex-direction:column;overflow:hidden}.view.active{display:flex}

.clients-header{padding:16px 16px 8px;display:flex;align-items:center;gap:8px}
.clients-header h2{font-size:22px;font-weight:700;flex:1}
.add-client-btn{padding:8px 14px;border:1px solid var(--accent);border-radius:50px;background:var(--accent-bg);color:var(--accent);font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:4px}
.add-client-btn:active{background:var(--accent);color:#fff}

.search-wrap{padding:0 16px 12px}
.search-wrap input{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius);font-family:var(--font);font-size:14px;background:var(--surface);color:var(--text);outline:none}
.search-wrap input:focus{border-color:var(--accent)}
.search-wrap input::placeholder{color:var(--text3)}

.clients-list{flex:1;overflow-y:auto;padding:0 16px 20px;-webkit-overflow-scrolling:touch}

.client-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:box-shadow .15s}
.client-card:active{box-shadow:var(--shadow-md)}
.client-card.pinned{border-right:3px solid var(--pin-c)}
.cc-avatar{width:42px;height:42px;border-radius:10px;background:var(--accent-bg);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:var(--accent);flex-shrink:0}
.cc-info{flex:1;min-width:0}
.cc-name{font-size:15px;font-weight:600}
.cc-meta{font-size:12px;color:var(--text3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cc-count{font-size:12px;font-weight:600;color:var(--accent);background:var(--accent-bg);padding:2px 8px;border-radius:50px;flex-shrink:0}
.cc-arrow{color:var(--text3);font-size:14px}

.detail-header{padding:12px 16px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.back-btn{width:34px;height:34px;border:none;background:none;border-radius:var(--radius-sm);font-size:18px;cursor:pointer;color:var(--accent);display:flex;align-items:center;justify-content:center}
.dh-info{flex:1}.dh-name{font-size:17px;font-weight:700}.dh-count{font-size:12px;color:var(--text3)}
.dh-actions{display:flex;gap:4px}

.notes-list{flex:1;overflow-y:auto;padding:12px 16px 120px;-webkit-overflow-scrolling:touch}
.note-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-bottom:8px;position:relative}
.note-item.pinned{border-right:3px solid var(--pin-c);background:var(--pin-bg)}
.ni-top{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.ni-time{font-size:11px;color:var(--text3);font-family:var(--mono)}.ni-date{font-size:11px;color:var(--text3)}.ni-pin{font-size:11px;color:var(--pin-c)}.ni-spacer{flex:1}
.ni-text{font-size:14px;line-height:1.65;white-space:pre-wrap;word-break:break-word}
.ni-actions{display:none;position:absolute;top:8px;left:8px;gap:2px}
.note-item:hover .ni-actions{display:flex}
@media(hover:none){.note-item .ni-actions{display:flex;opacity:.4}}
.ni-act{width:26px;height:26px;border:none;background:var(--surface2);border-radius:6px;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.ni-act:active{background:#dde1e8}.ni-act.del:active{background:#fee2e2}

.day-label{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;padding:10px 4px 6px}

.input-bar{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);padding:10px 16px;z-index:100;box-shadow:0 -2px 12px rgba(0,0,0,.04)}
.input-row{display:flex;gap:8px;align-items:flex-end}
.input-bar textarea{flex:1;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius);font-family:var(--font);font-size:14px;color:var(--text);background:var(--surface2);resize:none;outline:none;min-height:40px;max-height:120px;line-height:1.5}
.input-bar textarea:focus{border-color:var(--accent);background:var(--surface)}
.input-bar textarea::placeholder{color:var(--text3)}
.send-btn{width:40px;height:40px;border:none;background:var(--accent);color:#fff;border-radius:var(--radius);font-size:18px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.send-btn:active{background:var(--accent-dark);transform:scale(.95)}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border-radius:16px;padding:24px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.2);animation:modalIn .2s ease}
@keyframes modalIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.modal h3{font-size:17px;font-weight:700;margin-bottom:16px}
.modal input,.modal textarea{width:100%;padding:12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:var(--font);font-size:14px;color:var(--text);outline:none;margin-bottom:12px}
.modal input:focus,.modal textarea:focus{border-color:var(--accent)}
.modal textarea{resize:vertical;min-height:80px}
.modal-btns{display:flex;gap:8px;justify-content:flex-end}
.modal-btns button{padding:8px 20px;border-radius:var(--radius-sm);font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;border:none}
.m-save{background:var(--accent);color:#fff}.m-cancel{background:var(--surface2);color:var(--text2)}.m-danger{background:var(--danger);color:#fff}

.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--text);color:#fff;padding:10px 20px;border-radius:50px;font-size:13px;font-weight:600;z-index:300;opacity:0;transition:.3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto}
.empty-msg{text-align:center;padding:50px 20px;color:var(--text3);font-size:14px}
.empty-msg .emoji{font-size:36px;display:block;margin-bottom:8px}
</style>
</head>
<body>
<div class="pin-screen" id="pinScreen">
<div id="pinSetup" style="display:none;flex-direction:column;align-items:center;gap:16px">
<div class="pin-logo">🔐</div><div class="pin-title">הגדר קוד PIN</div>
<div class="pin-sub">הקוד ישמש גם להצפנת הנתונים שלך</div>
<div class="pin-setup-fields">
<input type="password" id="pinNew" maxlength="6" placeholder="קוד (4-6 ספרות)" inputmode="numeric">
<input type="password" id="pinConfirm" maxlength="6" placeholder="אשר קוד" inputmode="numeric">
<button class="pin-setup-btn" onclick="setupPin()">הגדר והתחל</button>
</div><div class="pin-error" id="setupError"></div></div>
<div id="pinUnlock" style="display:none;flex-direction:column;align-items:center;gap:12px">
<div class="pin-logo">🔒</div><div class="pin-title">NoteFlow</div>
<div class="pin-sub">הקלד את קוד ה-PIN</div>
<div class="pin-dots" id="pinDots"></div>
<div class="pin-error" id="unlockError"></div>
<div class="pin-pad" id="pinPad"></div></div></div>

<div class="app" id="app">
<div class="topbar"><div class="logo"><div class="dot"></div> NoteFlow</div><div class="save-dot" id="saveDot"></div><div class="spacer"></div><button class="tb-btn" onclick="showSettings()">⚙️</button></div>
<div class="view active" id="viewClients">
<div class="clients-header"><h2>לקוחות</h2><button class="add-client-btn" onclick="showAddClient()">+ חדש</button></div>
<div class="search-wrap"><input type="text" id="globalSearch" placeholder="🔍 חפש בכל ההערות..." oninput="globalSearchFilter()"></div>
<div class="clients-list" id="clientsList"></div></div>
<div class="view" id="viewDetail">
<div class="detail-header"><button class="back-btn" onclick="goBack()">→</button><div class="dh-info"><div class="dh-name" id="detailName"></div><div class="dh-count" id="detailCount"></div></div><div class="dh-actions"><button class="tb-btn" onclick="editClientName()">✏️</button><button class="tb-btn" onclick="deleteClient()">🗑️</button></div></div>
<div class="notes-list" id="notesList"></div>
<div class="input-bar" id="inputBar"><div class="input-row"><textarea id="noteInput" placeholder="הערה חדשה..." rows="1" oninput="autoResize(this)"></textarea><button class="send-btn" onclick="addNote()">↑</button></div></div></div>
<div class="view" id="viewSearch">
<div class="detail-header"><button class="back-btn" onclick="goBack()">→</button><div class="dh-info"><div class="dh-name">תוצאות חיפוש</div><div class="dh-count" id="searchCount"></div></div></div>
<div class="notes-list" id="searchResults"></div></div></div>
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()"><div class="modal" id="modalContent"></div></div>
<div class="toast" id="toast"></div>
<script>
let data={clients:[],settings:{}},encryptionKey='',currentClientId=null,saveTimer=null,enteredPin='';
const dot=document.getElementById('saveDot');
function getPinHash(){return localStorage.getItem('nf_pin_hash')}
function setPinHash(p){localStorage.setItem('nf_pin_hash',CryptoJS.SHA256(p).toString());localStorage.setItem('nf_pin_len',p.length.toString())}
function verifyPin(p){return CryptoJS.SHA256(p).toString()===getPinHash()}
function encrypt(o){return CryptoJS.AES.encrypt(JSON.stringify(o),encryptionKey).toString()}
function decrypt(c){try{const b=CryptoJS.AES.decrypt(c,encryptionKey);const j=b.toString(CryptoJS.enc.Utf8);return j?JSON.parse(j):null}catch(e){return null}}

function initPinScreen(){if(!getPinHash()){document.getElementById('pinSetup').style.display='flex';document.getElementById('pinUnlock').style.display='none'}else{document.getElementById('pinSetup').style.display='none';document.getElementById('pinUnlock').style.display='flex';buildPinPad()}}

window.setupPin=async function(){const p=document.getElementById('pinNew').value,c=document.getElementById('pinConfirm').value,e=document.getElementById('setupError');
if(p.length<4||p.length>6){e.textContent='4-6 ספרות';return}if(!/^\d+$/.test(p)){e.textContent='רק ספרות';return}if(p!==c){e.textContent='לא תואם';return}
setPinHash(p);encryptionKey=p;
e.textContent='טוען נתונים...';e.style.color='var(--accent)';
try{const r=await fetch('/.netlify/functions/notes');const j=await r.json();const raw=j.notes;
if(typeof raw==='string'){const d=decrypt(raw);if(d){data=d;e.textContent='';unlockApp();return}}
if(Array.isArray(raw)&&raw.length>0){const m={};raw.forEach(n=>{const cn=n.client||'כללי';if(!m[cn])m[cn]={id:cn.replace(/\s+/g,'_').toLowerCase()+'_'+Date.now(),name:cn,notes:[],pinned:false};m[cn].notes.push({id:n.id,text:n.text,ts:n.ts,pinned:n.pinned||false})});data={clients:Object.values(m),settings:{}};triggerSave();unlockApp();return}
}catch(err){}
data={clients:[{id:'general',name:'כללי',notes:[],pinned:false}],settings:{}};triggerSave();unlockApp()};

function buildPinPad(){const len=parseInt(localStorage.getItem('nf_pin_len')||'4');
const d=document.getElementById('pinDots');d.innerHTML='';for(let i=0;i<len;i++)d.innerHTML+='<div class="pin-dot" id="dot'+i+'"></div>';
const pad=document.getElementById('pinPad');pad.innerHTML='';
for(let i=1;i<=9;i++)pad.innerHTML+='<button class="pin-key" onclick="pressKey(\''+i+'\')">'+i+'</button>';
pad.innerHTML+='<button class="pin-key fn" onclick="clearPin()">מחק</button><button class="pin-key" onclick="pressKey(\'0\')">0</button><button class="pin-key fn" onclick="submitPin()">אשר</button>'}

window.pressKey=function(k){const len=parseInt(localStorage.getItem('nf_pin_len')||'4');if(enteredPin.length>=len)return;enteredPin+=k;updateDots();if(enteredPin.length===len)setTimeout(submitPin,150)};
window.clearPin=function(){enteredPin=enteredPin.slice(0,-1);updateDots();document.getElementById('unlockError').textContent='';document.querySelectorAll('.pin-dot').forEach(d=>d.classList.remove('error'))};
window.submitPin=function(){if(verifyPin(enteredPin)){encryptionKey=enteredPin;loadData().then(()=>unlockApp())}else{document.getElementById('unlockError').textContent='קוד שגוי';document.querySelectorAll('.pin-dot').forEach(d=>d.classList.add('error'));setTimeout(()=>{enteredPin='';updateDots();document.querySelectorAll('.pin-dot').forEach(d=>d.classList.remove('error'));document.getElementById('unlockError').textContent=''},800)}};
function updateDots(){const len=parseInt(localStorage.getItem('nf_pin_len')||'4');for(let i=0;i<len;i++){const el=document.getElementById('dot'+i);if(el)el.classList.toggle('filled',i<enteredPin.length)}}
function unlockApp(){document.getElementById('pinScreen').classList.add('hidden');document.getElementById('app').classList.add('active');renderClients()}

async function loadData(){try{const r=await fetch('/.netlify/functions/notes');const j=await r.json();const raw=j.notes;
if(typeof raw==='string'){const d=decrypt(raw);data=d||{clients:[{id:'general',name:'כללי',notes:[],pinned:false}],settings:{}}}
else if(Array.isArray(raw)&&raw.length>0){const m={};raw.forEach(n=>{const c=n.client||'כללי';if(!m[c])m[c]={id:c.replace(/\s+/g,'_').toLowerCase()+'_'+Date.now(),name:c,notes:[],pinned:false};m[c].notes.push({id:n.id,text:n.text,ts:n.ts,pinned:n.pinned||false})});data={clients:Object.values(m),settings:{}};triggerSave()}
else{data={clients:[{id:'general',name:'כללי',notes:[],pinned:false}],settings:{}}}
dot.className='save-dot'}catch(e){dot.className='save-dot error';data={clients:[{id:'general',name:'כללי',notes:[],pinned:false}],settings:{}}}}

function triggerSave(){clearTimeout(saveTimer);dot.className='save-dot saving';saveTimer=setTimeout(doSave,1200)}
async function doSave(){try{const enc=encrypt(data);const r=await fetch('/.netlify/functions/notes',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({notes:enc})});dot.className=r.ok?'save-dot':'save-dot error'}catch(e){dot.className='save-dot error'}}

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function detectDir(t){return/[\u0590-\u05FF]/.test(t.charAt(0))?'rtl':'ltr'}

function renderClients(){const list=document.getElementById('clientsList');
if(!data.clients.length){list.innerHTML='<div class="empty-msg"><span class="emoji">📂</span>אין לקוחות<br>לחץ "+ חדש"</div>';return}
const sorted=[...data.clients].sort((a,b)=>{if(a.pinned&&!b.pinned)return -1;if(!a.pinned&&b.pinned)return 1;const al=a.notes.length?Math.max(...a.notes.map(n=>n.ts)):0;const bl=b.notes.length?Math.max(...b.notes.map(n=>n.ts)):0;return bl-al});
list.innerHTML=sorted.map(c=>{const cnt=c.notes.length;const last=c.notes.length?[...c.notes].sort((a,b)=>b.ts-a.ts)[0]:null;
const txt=last?(last.text.length>50?last.text.substring(0,50)+'...':last.text):'ריק';
const dt=last?new Date(last.ts).toLocaleDateString('he-IL',{day:'numeric',month:'short'}):'';
return'<div class="client-card'+(c.pinned?' pinned':'')+'" onclick="openClient(\''+c.id+'\')"><div class="cc-avatar">'+esc(c.name.substring(0,2))+'</div><div class="cc-info"><div class="cc-name">'+esc(c.name)+'</div><div class="cc-meta">'+esc(txt)+' · '+dt+'</div></div><span class="cc-count">'+cnt+'</span><span class="cc-arrow">←</span></div>'}).join('')}

window.openClient=function(id){currentClientId=id;document.getElementById('viewClients').classList.remove('active');document.getElementById('viewDetail').classList.add('active');document.getElementById('viewSearch').classList.remove('active');renderDetail()};
window.goBack=function(){currentClientId=null;document.getElementById('viewDetail').classList.remove('active');document.getElementById('viewSearch').classList.remove('active');document.getElementById('viewClients').classList.add('active');document.getElementById('globalSearch').value='';renderClients()};
function getClient(id){return data.clients.find(c=>c.id===id)}

function renderDetail(){const cl=getClient(currentClientId);if(!cl)return;
document.getElementById('detailName').textContent=cl.name;document.getElementById('detailCount').textContent=cl.notes.length+' הערות';
const list=document.getElementById('notesList');
if(!cl.notes.length){list.innerHTML='<div class="empty-msg"><span class="emoji">📝</span>אין הערות<br>כתוב למטה</div>';return}
const sorted=[...cl.notes].sort((a,b)=>b.ts-a.ts);
const groups={};sorted.forEach(n=>{const d=new Date(n.ts);const k=d.toLocaleDateString('he-IL',{weekday:'long',day:'numeric',month:'long'});if(!groups[k])groups[k]=[];groups[k].push(n)});
let html='';for(const[day,items]of Object.entries(groups)){html+='<div class="day-label">'+day+'</div>';
items.forEach(n=>{const d=new Date(n.ts);const t=String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');const dt=d.toLocaleDateString('he-IL',{day:'numeric',month:'numeric'});
html+='<div class="note-item'+(n.pinned?' pinned':'')+'"><div class="ni-actions"><button class="ni-act" onclick="toggleNotePin(\''+n.id+'\')">'+(n.pinned?'📌':'📍')+'</button><button class="ni-act" onclick="editNote(\''+n.id+'\')">✏️</button><button class="ni-act del" onclick="deleteNote(\''+n.id+'\')">🗑️</button></div><div class="ni-top">'+(n.pinned?'<span class="ni-pin">📌</span>':'')+'<span class="ni-time">'+t+'</span><span class="ni-date">'+dt+'</span><span class="ni-spacer"></span></div><div class="ni-text" dir="'+detectDir(n.text)+'">'+esc(n.text)+'</div></div>'})}
list.innerHTML=html}

window.addNote=function(){const input=document.getElementById('noteInput');const text=input.value.trim();if(!text||!currentClientId)return;
const cl=getClient(currentClientId);if(!cl)return;
cl.notes.push({id:Date.now().toString(36)+Math.random().toString(36).substr(2,4),text:text,ts:Date.now(),pinned:false});
input.value='';input.style.height='auto';renderDetail();triggerSave()};
document.getElementById('noteInput').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();addNote()}});
window.autoResize=function(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px'};

window.toggleNotePin=function(nid){const cl=getClient(currentClientId);const n=cl&&cl.notes.find(x=>x.id===nid);if(n){n.pinned=!n.pinned;renderDetail();triggerSave()}};
window.editNote=function(nid){const cl=getClient(currentClientId);const n=cl&&cl.notes.find(x=>x.id===nid);if(!n)return;
showModal('✏️ עריכה','<textarea id="mEditText" rows="4">'+esc(n.text)+'</textarea>',[{label:'ביטול',cls:'m-cancel',action:'closeModal()'},{label:'שמור',cls:'m-save',action:"saveNoteEdit('"+nid+"')"}])};
window.saveNoteEdit=function(nid){const cl=getClient(currentClientId);const n=cl&&cl.notes.find(x=>x.id===nid);if(n){n.text=document.getElementById('mEditText').value.trim();renderDetail();triggerSave()}closeModal()};
window.deleteNote=function(nid){const cl=getClient(currentClientId);if(!cl)return;const i=cl.notes.findIndex(x=>x.id===nid);if(i>-1){const rm=cl.notes.splice(i,1)[0];renderDetail();triggerSave();showToast('🗑️ נמחק',()=>{cl.notes.splice(i,0,rm);renderDetail();triggerSave()})}};

window.showAddClient=function(){showModal('➕ לקוח חדש','<input type="text" id="mClientName" placeholder="שם הלקוח..." autofocus>',[{label:'ביטול',cls:'m-cancel',action:'closeModal()'},{label:'הוסף',cls:'m-save',action:'addClient()'}]);setTimeout(()=>document.getElementById('mClientName')?.focus(),200)};
window.addClient=function(){const n=document.getElementById('mClientName')?.value.trim();if(!n)return;data.clients.push({id:Date.now().toString(36)+Math.random().toString(36).substr(2,4),name:n,notes:[],pinned:false});renderClients();triggerSave();closeModal();showToast('✅ נוסף')};
window.editClientName=function(){const cl=getClient(currentClientId);if(!cl)return;showModal('✏️ שנה שם','<input type="text" id="mRename" value="'+esc(cl.name)+'">',[{label:'ביטול',cls:'m-cancel',action:'closeModal()'},{label:'שמור',cls:'m-save',action:'saveClientName()'}])};
window.saveClientName=function(){const cl=getClient(currentClientId);if(cl){cl.name=document.getElementById('mRename').value.trim();document.getElementById('detailName').textContent=cl.name;triggerSave()}closeModal()};
window.deleteClient=function(){const cl=getClient(currentClientId);if(!cl)return;showModal('🗑️ מחיקה','<p style="font-size:14px;color:var(--text2);margin-bottom:12px">למחוק את "<b>'+esc(cl.name)+'</b>" וכל ההערות?</p>',[{label:'ביטול',cls:'m-cancel',action:'closeModal()'},{label:'מחק',cls:'m-danger',action:'confirmDeleteClient()'}])};
window.confirmDeleteClient=function(){data.clients=data.clients.filter(c=>c.id!==currentClientId);triggerSave();closeModal();goBack();showToast('🗑️ נמחק')};

window.globalSearchFilter=function(){const q=document.getElementById('globalSearch').value.trim().toLowerCase();
if(!q){document.getElementById('viewSearch').classList.remove('active');document.getElementById('viewClients').classList.add('active');return}
document.getElementById('viewClients').classList.remove('active');document.getElementById('viewSearch').classList.add('active');
const results=[];data.clients.forEach(c=>{c.notes.forEach(n=>{if(n.text.toLowerCase().includes(q)||c.name.toLowerCase().includes(q))results.push({...n,clientName:c.name,clientId:c.id})})});
document.getElementById('searchCount').textContent=results.length+' תוצאות';
const el=document.getElementById('searchResults');
if(!results.length){el.innerHTML='<div class="empty-msg"><span class="emoji">🔍</span>לא נמצא</div>';return}
el.innerHTML=results.sort((a,b)=>b.ts-a.ts).map(r=>{const d=new Date(r.ts);const t=String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
return'<div class="note-item" onclick="openClient(\''+r.clientId+'\')"><div class="ni-top"><span style="font-size:11px;font-weight:600;color:var(--accent);background:var(--accent-bg);padding:2px 8px;border-radius:50px">'+esc(r.clientName)+'</span><span class="ni-time">'+t+'</span></div><div class="ni-text" dir="'+detectDir(r.text)+'">'+esc(r.text)+'</div></div>'}).join('')};

window.showSettings=function(){showModal('⚙️ הגדרות','<button class="m-cancel" style="width:100%;padding:12px;margin-bottom:8px;border-radius:var(--radius-sm);font-family:var(--font);font-size:14px;cursor:pointer;border:1px solid var(--border)" onclick="changePin()">🔑 שנה PIN</button><button class="m-cancel" style="width:100%;padding:12px;border-radius:var(--radius-sm);font-family:var(--font);font-size:14px;cursor:pointer;border:1px solid var(--border)" onclick="exportData()">📋 ייצוא</button>',[{label:'סגור',cls:'m-cancel',action:'closeModal()'}])};
window.changePin=function(){closeModal();showModal('🔑 שנה PIN','<input type="password" id="mOldPin" placeholder="PIN נוכחי" inputmode="numeric" maxlength="6"><input type="password" id="mNewPin" placeholder="PIN חדש" inputmode="numeric" maxlength="6"><input type="password" id="mConfirmPin" placeholder="אשר" inputmode="numeric" maxlength="6">',[{label:'ביטול',cls:'m-cancel',action:'closeModal()'},{label:'שמור',cls:'m-save',action:'savePinChange()'}])};
window.savePinChange=function(){const o=document.getElementById('mOldPin').value,n=document.getElementById('mNewPin').value,c=document.getElementById('mConfirmPin').value;if(!verifyPin(o)){showToast('❌ PIN שגוי');return}if(n.length<4){showToast('❌ מינימום 4');return}if(n!==c){showToast('❌ לא תואם');return}setPinHash(n);encryptionKey=n;triggerSave();closeModal();showToast('✅ עודכן')};
window.exportData=function(){let t='';data.clients.forEach(c=>{t+='=== '+c.name+' ===\n';c.notes.sort((a,b)=>a.ts-b.ts).forEach(n=>{const d=new Date(n.ts);t+='['+d.toLocaleDateString('he-IL')+' '+d.toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'})+'] '+n.text+'\n'});t+='\n'});
const blob=new Blob(['\uFEFF'+t],{type:'text/plain;charset=utf-8'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='noteflow-export.txt';a.click();URL.revokeObjectURL(url);showToast('📋 הורד')};

function showModal(title,body,buttons){document.getElementById('modalContent').innerHTML='<h3>'+title+'</h3>'+body+'<div class="modal-btns">'+buttons.map(b=>'<button class="'+b.cls+'" onclick="'+b.action+'">'+b.label+'</button>').join('')+'</div>';document.getElementById('modalOverlay').classList.add('open')}
window.closeModal=function(){document.getElementById('modalOverlay').classList.remove('open')};

let toastTimer;
function showToast(msg,undoFn){const toast=document.getElementById('toast');clearTimeout(toastTimer);
if(undoFn){toast.innerHTML=msg+' <button onclick="this.parentElement._undo()" style="background:rgba(255,255,255,.2);border:none;color:#fff;padding:3px 10px;border-radius:20px;font-family:var(--font);font-weight:600;font-size:12px;cursor:pointer;margin-right:8px">ביטול</button>';toast._undo=()=>{undoFn();toast.classList.remove('show');clearTimeout(toastTimer)}}else{toast.textContent=msg}
toast.classList.add('show');toastTimer=setTimeout(()=>toast.classList.remove('show'),4000)}

initPinScreen();
</script>
</body>
</html>
